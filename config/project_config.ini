[kafka]
bootstrap_servers = kafka:9092
topic_name = weather_data
alerts_topic = weather_alerts
client_id = weather_producer

[cassandra]
hosts = cassandra
port = 9042
keyspace = weather_monitoring
raw_data_table = raw_weather_data
aggregated_data_table = aggregated_weather
metadata_table = station_metadata
alerts_table = weather_alerts

[spark]
app_name = WeatherMonitoring
# Sliding window definitions for aggregation
window_size = 5 minutes
slide_interval = 1 minute
watermark = 2 minutes

[stations]
# station_id : name | city | latitude | longitude | altitude_m
ids = STATION_PRISHTINA,STATION_PEJA,STATION_PRIZREN
STATION_PRISHTINA = Prishtina Station|Prishtina|42.6629|21.1655|652
STATION_PEJA = Peja Station|Peja|42.6593|20.2887|520
STATION_PRIZREN = Prizren Station|Prizren|42.2139|20.7397|412

[simulator]
# Seconds between emitted readings (real wall-clock)
emit_interval_seconds = 2
# How many simulated minutes each emitted reading represents (time compression)
sim_minutes_per_reading = 10
# Probability per reading-cycle that a storm event begins (per station)
storm_probability = 0.02
# Average number of readings a storm lasts
storm_duration_readings = 12
# Probability per reading of an injected sensor anomaly spike
anomaly_probability = 0.01

[thresholds]
# parameter = warn_low,crit_low,warn_high,crit_high  (use - for "not applicable")
# Climate-aware hazard bands (not human-comfort), config-driven so they can be tuned per deployment.
temperature = -5,-12,35,40
humidity = -,-,85,95
pressure = 995,980,1030,1040
precipitation = -,-,15,30
wind_speed = -,-,14,20
